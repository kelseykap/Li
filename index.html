<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fafaf7">
<title>Library</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%231a1a1a'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='40' fill='%23fafaf7' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-soft: #6b6b66;
    --text-mute: #9a9a93;
    --line: #ececea;
    --line-strong: #d8d8d4;
    --accent: #b8543f;
    --accent-soft: #f3e3df;
    --warn: #b35; /* red-ish for delete */
    --radius: 4px;
    --container: 600px;
    --nav-h: 56px;
    --header-h: 52px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131312;
      --surface: #1e1e1c;
      --text: #f0eee8;
      --text-soft: #a8a8a2;
      --text-mute: #6f6f6a;
      --line: #2c2c2a;
      --line-strong: #3a3a37;
      --accent: #d77764;
      --accent-soft: #3a2622;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
  }
  a { color: inherit; text-decoration: none; }
  button, input, textarea, select {
    font: inherit; color: inherit; background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    padding: 10px 12px;
    width: 100%;
  }
  button { cursor: pointer; background: var(--surface); }
  button:active { opacity: 0.7; }
  textarea { resize: vertical; min-height: 100px; font-family: inherit; }
  input[type="checkbox"] { width: auto; }
  hr { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }

  /* layout */
  #app { max-width: var(--container); margin: 0 auto; padding: 0 16px; padding-top: calc(var(--header-h) + env(safe-area-inset-top)); }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding-top: env(safe-area-inset-top);
  }
  .header-inner {
    max-width: var(--container); margin: 0 auto;
    height: var(--header-h);
    padding: 0 16px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 500;
  }
  .header h1 { font-size: 17px; font-weight: 500; margin: 0; flex: 1; text-align: center; letter-spacing: 0.2px; }
  .icon-btn {
    width: 36px; height: 36px; padding: 0; border: 0; background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 18px;
  }
  .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .icon-btn:active { background: var(--line); }

  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--bg);
    border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-inner {
    max-width: var(--container); margin: 0 auto;
    height: var(--nav-h);
    display: grid; grid-template-columns: repeat(5, 1fr);
  }
  .nav a {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    color: var(--text-mute);
    font-size: 10px; letter-spacing: 0.3px;
  }
  .nav a.active { color: var(--text); }
  .nav a svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .nav a.add svg { stroke-width: 1.3; }

  /* filter bar */
  .filters {
    display: flex; gap: 6px; padding: 12px 0 8px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    padding: 6px 12px; border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 13px; white-space: nowrap;
    background: transparent; width: auto;
  }
  .pill.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  .search-row { display: flex; gap: 8px; padding-bottom: 8px; }
  .search-row input { flex: 1; }
  .search-row select { width: auto; }

  /* book list */
  .book-list { list-style: none; padding: 0; margin: 0; }
  .book-row {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .book-row:last-child { border-bottom: 0; }
  .cover {
    width: 56px; height: 84px;
    background: var(--line); border-radius: 2px;
    object-fit: cover; display: block;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .cover-placeholder {
    width: 56px; height: 84px; border-radius: 2px;
    background: linear-gradient(135deg, var(--line) 0%, var(--line-strong) 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute); font-size: 18px; font-family: Georgia, serif;
  }
  .book-row .title { font-weight: 500; line-height: 1.3; }
  .book-row .author { color: var(--text-soft); font-size: 13px; margin-top: 1px; }
  .book-row .meta { color: var(--text-mute); font-size: 12px; margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .book-row .right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .badge { font-size: 10px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-mute); }
  .bookmark-on { color: var(--accent); }
  .rating-dots { display: inline-flex; gap: 2px; }
  .rating-dots .d { width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .rating-dots .d.on { background: var(--text); }
  .rating-dots.accent .d.on { background: var(--accent); }
  .empty { color: var(--text-mute); text-align: center; padding: 40px 16px; }

  /* detail */
  .detail .cover-hero { display: flex; justify-content: center; padding: 16px 0 20px; }
  .detail .cover-hero img, .detail .cover-hero .cover-placeholder.big {
    width: 160px; height: 240px; object-fit: cover; border-radius: 3px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  .cover-placeholder.big { width: 160px !important; height: 240px !important; font-size: 48px; }
  .detail h2 { font-size: 22px; line-height: 1.2; margin: 0 0 4px; font-weight: 500; text-align: center; }
  .detail .author { color: var(--text-soft); text-align: center; margin-bottom: 16px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin: 16px 0; }
  .meta-grid .k { color: var(--text-mute); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 2px; }
  .meta-grid .v { font-size: 14px; }
  .section-h { font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-mute); margin: 24px 0 8px; }
  .notes { white-space: pre-wrap; line-height: 1.55; }
  .quotes li { padding: 10px 12px; border-left: 2px solid var(--accent); background: var(--accent-soft); margin-bottom: 8px; border-radius: 0 2px 2px 0; }
  .quotes { list-style: none; padding: 0; margin: 0; }
  .action-row { display: flex; gap: 8px; margin-top: 24px; }
  .action-row button { flex: 1; }
  .danger { color: var(--warn); border-color: var(--warn); background: transparent; }

  /* form */
  .form .field { margin-bottom: 14px; }
  .form label { display: block; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-mute); margin-bottom: 4px; }
  .form .row { display: flex; gap: 8px; }
  .form .row > * { flex: 1; }
  .seg { display: inline-flex; border: 1px solid var(--line-strong); border-radius: var(--radius); overflow: hidden; width: 100%; }
  .seg button { border: 0; border-radius: 0; background: transparent; padding: 9px; flex: 1; }
  .seg button + button { border-left: 1px solid var(--line-strong); }
  .seg button.on { background: var(--text); color: var(--bg); }
  .rating-pick { display: flex; gap: 8px; align-items: center; }
  .rating-pick .dot { width: 28px; height: 28px; border-radius: 50%; background: transparent; border: 1.5px solid var(--line-strong); padding: 0; }
  .rating-pick .dot.on { background: var(--accent); border-color: var(--accent); }
  .rating-pick .label { color: var(--text-soft); font-size: 13px; margin-left: 6px; }
  .cover-preview { display: flex; gap: 12px; align-items: flex-start; }
  .cover-preview img, .cover-preview .cover-placeholder { width: 80px; height: 120px; object-fit: cover; border-radius: 2px; }
  .cover-preview .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .quote-edit { display: flex; gap: 6px; margin-bottom: 6px; }
  .quote-edit textarea { min-height: 60px; }
  .quote-edit button { width: auto; padding: 8px 10px; }
  .save-btn { background: var(--text); color: var(--bg); border-color: var(--text); }
  .toast {
    position: fixed; bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 10px 16px; border-radius: 24px;
    font-size: 13px; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  /* stats */
  .stat-hero { text-align: center; padding: 24px 0 16px; border-bottom: 1px solid var(--line); }
  .stat-hero .n { font-size: 56px; font-weight: 300; line-height: 1; font-family: Georgia, serif; }
  .stat-hero .l { color: var(--text-mute); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .bar-row { display: grid; grid-template-columns: 48px 1fr 32px; gap: 8px; align-items: center; font-size: 13px; }
  .bar-row .bar { background: var(--line); height: 18px; border-radius: 2px; overflow: hidden; }
  .bar-row .bar > div { height: 100%; background: var(--accent); }
  .bar-row .n { color: var(--text-soft); text-align: right; }
  .read-list-mini { list-style: none; padding: 0; margin: 0; }
  .read-list-mini li { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .read-list-mini .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .read-list-mini .d { color: var(--text-mute); font-variant-numeric: tabular-nums; }

  /* map */
  #map { position: fixed; top: calc(var(--header-h) + env(safe-area-inset-top)); left: 0; right: 0; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom)); z-index: 1; }
  .leaflet-popup-content { font: 13px/1.4 inherit; }
  .leaflet-popup-content a { color: var(--accent); }

  /* settings */
  .group { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .group h3 { margin: 0 0 10px; font-size: 13px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-mute); font-weight: 600; }
  .group p { color: var(--text-soft); font-size: 13px; margin: 6px 0; }
  .helper { color: var(--text-mute); font-size: 12px; margin-top: 4px; }
  .file-input { font-size: 13px; padding: 4px; }

  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line-strong); border-top-color: var(--text); border-radius: 50%; animation: s 0.7s linear infinite; vertical-align: middle; }
  @keyframes s { to { transform: rotate(360deg); } }

  @media (min-width: 700px) {
    .header h1 { text-align: left; padding-left: 4px; }
  }
</style>
</head>
<body>

  <div class="header-inner" id="header"></div>
</header>

<nav class="nav" aria-label="Primary">
